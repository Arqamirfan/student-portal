<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftSkills Engineering – Student Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .form-tabs { display: none; }
    .form-tabs.active { display: block; }
    .login-container .form-group select option { background: #1a1a2e; }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>

  <div class="login-page">
    <div class="login-container">
      <div class="logo-section">
        <img src="images/logo.png" alt="SoftSkills Engineering" onerror="this.style.display='none'">
        <h1>SOFTSKILLS</h1>
        <p>ENGINEERING · ISLAMABAD</p>
      </div>

      <div class="login-tab-switcher">
        <button class="login-tab-btn active" onclick="switchTab('login', this)">Student Login</button>
        <button class="login-tab-btn" onclick="switchTab('register', this)">Register</button>
      </div>

      <div id="alertBox" class="alert"></div>

      <!-- LOGIN -->
      <div id="loginTab" class="form-tabs active">
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="student@email.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn-primary" id="loginBtn">Login to Portal</button>
        </form>
        <p style="text-align:center;margin-top:18px;font-size:12px;color:rgba(255,255,255,0.4);">
          <a href="admin-login.html" style="color:rgba(255,255,255,0.5);text-decoration:none;">Admin Panel →</a>
        </p>
      </div>

      <!-- REGISTER -->
      <div id="registerTab" class="form-tabs">
        <form onsubmit="handleRegister(event)">
          <div class="form-grid-2">
            <div class="form-group"><label>Full Name *</label><input type="text" id="regName" placeholder="Your full name" required></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="regPhone" placeholder="+92 300..."></div>
            <div class="form-group full"><label>Email *</label><input type="email" id="regEmail" placeholder="your@email.com" required></div>
            <div class="form-group"><label>CNIC</label><input type="text" id="regCnic" placeholder="xxxxx-xxxxxxx-x"></div>
            <div class="form-group"><label>Password *</label><input type="password" id="regPassword" placeholder="Min 6 chars" required minlength="6"></div>
            <div class="form-group full"><label>Select Course *</label><select id="regCourse" required><option value="">Loading courses...</option></select></div>
          </div>
          <button type="submit" class="btn-primary" id="regBtn">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    if (localStorage.getItem('ss_token')) window.location.href = 'dashboard.html';

    async function loadCourses() {
      const res = await fetch('/api/auth/courses');
      const data = await res.json();
      const sel = document.getElementById('regCourse');
      const groups = {};
      data.courses.forEach(c => { if (!groups[c.category]) groups[c.category] = []; groups[c.category].push(c); });
      sel.innerHTML = '<option value="">-- Select Your Course --</option>';
      Object.entries(groups).forEach(([cat, list]) => {
        const g = document.createElement('optgroup');
        g.label = cat;
        list.forEach(c => {
          const o = document.createElement('option');
          o.value = c.id;
          o.textContent = `${c.name} – PKR ${Number(c.total_fee).toLocaleString()}`;
          g.appendChild(o);
        });
        sel.appendChild(g);
      });
    }
    loadCourses();

    function switchTab(tab, btn) {
      document.querySelectorAll('.login-tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('registerTab').classList.toggle('active', tab === 'register');
      document.getElementById('alertBox').classList.remove('show');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Logging in...'; btn.disabled = true;
      const alert = document.getElementById('alertBox');

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value })
      });
      const data = await res.json();

      if (!res.ok) { alert.className = 'alert show alert-error'; alert.textContent = data.error; btn.textContent = 'Login to Portal'; btn.disabled = false; return; }

      localStorage.setItem('ss_token', data.token);
      localStorage.setItem('ss_student', JSON.stringify(data.student));
      alert.className = 'alert show alert-success';
      alert.textContent = '✅ Login successful!';
      setTimeout(() => window.location.href = 'dashboard.html', 700);
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      btn.textContent = 'Creating account...'; btn.disabled = true;
      const alert = document.getElementById('alertBox');

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
          phone: document.getElementById('regPhone').value,
          cnic: document.getElementById('regCnic').value,
          course_id: document.getElementById('regCourse').value
        })
      });
      const data = await res.json();

      if (!res.ok) { alert.className = 'alert show alert-error'; alert.textContent = data.error; btn.textContent = 'Create Account'; btn.disabled = false; return; }

      alert.className = 'alert show alert-success';
      alert.textContent = `✅ Done! Your Student ID: ${data.student_id}. Please login.`;
      setTimeout(() => { document.querySelector('.login-tab-btn').click(); }, 2500);
      btn.textContent = 'Create Account'; btn.disabled = false;
    }
  </script>
</body>
</html>
